<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — ZHCET</title>

  <link rel="stylesheet" href="/css/style.css"/>

  <link rel="stylesheet" href="/css/login.css"/>
</head>
<body>

<div class="login-page">

  <div class="login-left">
    <h1>ZHCET Portal</h1>
    <p>Access faculty dashboard, manage profiles, and explore departments.</p>
  </div>

  <div class="login-right">
    <div class="login-card">

      <a href="/index.html" class="back-link">← Back to Home</a>

      <h2>Welcome Back</h2>
      <p class="subtitle">Sign in to continue</p>

      <div id="alert" style="display:none;"></div>

      <div class="form-group">
        <label>Email address</label>
        <input type="email" id="email" placeholder="admin@zhcet.ac.in"/>
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="••••••••"/>
      </div>

      <button class="btn-primary full-btn" onclick="handleLogin()">Sign In</button>

      <p class="note">Students can browse without logging in.</p>

    </div>
  </div>

</div>

<script src="../js/api.js"></script>
<script src="../js/auth.js"></script>

<script>
const existing = getUser();
if (existing) {
  if (existing.role === 'admin')        window.location.href = '/pages/dashboard/admin.html';
  else if (existing.role === 'faculty') window.location.href = '/pages/dashboard/faculty.html';
  else                                  window.location.href = '/index.html';
}

document.getElementById('password').addEventListener('keydown', e => {
  if (e.key === 'Enter') handleLogin();
});

async function handleLogin() {
  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const alert    = document.getElementById('alert');
  alert.style.display = 'none';

  if (!email || !password) {
    showAlert('Please enter email and password.', 'error');
    return;
  }

  try {
    const user = await api.post('/api/auth/login', { email, password });
    saveUser(user);

    if (user.role === 'admin')        window.location.href = '/pages/dashboard/admin.html';
    else if (user.role === 'faculty') window.location.href = '/pages/dashboard/faculty.html';
    else                              window.location.href = '/index.html';

  } catch (err) {
    showAlert(err.message || 'Login failed.', 'error');
  }
}

function showAlert(msg, type) {
  const el = document.getElementById('alert');
  el.className = `alert alert-${type}`;
  el.textContent = msg;
  el.style.display = 'block';
}
</script>

</body>
</html>
